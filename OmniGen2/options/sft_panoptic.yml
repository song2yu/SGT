name: ft_panoptic

seed: 2233
device_specific_seed: true
workder_specific_seed: true

data:
  # '<DATA_ROOT>/data/train2017/'
  data_path: data_configs/train/example/edit/sft_panoptic.yml
  use_chat_template: true
  maximum_text_tokens: 888
  prompt_dropout_prob: !!float 0.0001
  ref_img_dropout_prob: !!float 0.5
  max_output_pixels: 1048576 # 1024 * 1024
  max_input_pixels: [1048576, 1048576, 589824, 262144] # [1024*1024, 1024*1024, 768*768, 512*512]
  max_side_length: 2048
  # Interleave task types across grad-accum steps to keep a stable 2:1
  # SAM-vs-SFT ratio on a single GPU (grad_accum=3).
  interleave_pattern: [gen, gen, sft]
  
model:
  # Local paths populated by shells/download_pretrained.sh.
  pretrained_vae_model_name_or_path: pretrained_models/FLUX.1-dev
  pretrained_text_encoder_model_name_or_path: pretrained_models/Qwen2.5-VL-3B-Instruct
  pretrained_model_path: pretrained_models/OmniGen2
  
  arch_opt:
    patch_size: 2
    in_channels: 16
    hidden_size: 2520
    num_layers: 32
    num_refiner_layers: 2
    num_attention_heads: 21
    num_kv_heads: 7
    multiple_of: 256
    norm_eps: !!float 1e-05
    axes_dim_rope: [40, 40, 40]
    axes_lens: [10000, 10000, 10000]
    text_feat_dim: 2048
    timestep_scale: !!float 1000

transport:
  snr_type: lognorm
  do_shift: true
  dynamic_time_shift: true

train:
  # Dataloader.
  # With gradient_accumulation_steps=3 and interleave_pattern [gen,gen,sft]
  # above, one optimizer step uses 2 gen micro-batches + 1 sft micro-batch.
  global_batch_size: 60
  batch_size: 2
  gradient_accumulation_steps: 30

  max_train_steps: 5000

  # Run dataloader workers in parallel so the main process is not blocked
  # by disk I/O + Qwen processor.
  dataloader_num_workers: 6

  # Optimizer
  learning_rate: !!float 5e-6
  scale_lr: false
  lr_scheduler: timm_constant_with_warmup
  warmup_t: 300
  warmup_lr_init: 1e-18
  warmup_prefix: true
  t_in_epochs: false

  # resume_from_checkpoint: 

  use_8bit_adam: false
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_weight_decay: !!float 0.01
  adam_epsilon: !!float 1e-08
  max_grad_norm: 1

  gradient_checkpointing: true
  
  set_grads_to_none: true

  # Misc
  allow_tf32: false
  mixed_precision: 'bf16'

  ema_decay: 0.0

val:
  validation_steps: 500
  train_visualization_steps: 500

logger:
  # Default: no experiment trackers. Set to [wandb, tensorboard] to re-enable.
  log_with: ~
  # log_with: [wandb, tensorboard]

  checkpointing_steps: 250
  checkpoints_total_limit: ~

cache_dir: 
resume_from_checkpoint: latest