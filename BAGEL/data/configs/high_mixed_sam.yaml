sam190k:
  dataset_names:
  - sam190k
  image_transform_args:
    image_stride: 16
    max_image_size: 1024
    min_image_size: 512

  vit_image_transform_args:
    image_stride: 14
    max_image_size: 224
    min_image_size: 224

  is_mandatory: True
  num_used_data:
  - 100000 # 2k 8k 290K
  weight: 1 #  3.2759/5 3.931/6   4.5862/7  5.2413/8

vlm_sft: # llava_ov
  dataset_names:
  - vlm_sft
  image_transform_args:
    image_stride: 14
    max_image_size: 980
    min_image_size: 378
    max_pixels: 2_007_040
  frame_sampler_args:
    max_num_frames: 12
    min_num_frames: 8
  is_mandatory: True
  shuffle_lines: True
  shuffle_seed: 0
  num_used_data:
  - 500000
  weight: 5.0

